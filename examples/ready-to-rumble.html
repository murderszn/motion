<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>READY to RUMBLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,200;0,14..32,400;1,14..32,300&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050507;
      --bg-alt: #2a2a31;
      --text-muted: #8e8e98;
      --text: #f4f4f6;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--text);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #frame {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    #frame-inner {
      position: relative;
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      overflow: hidden;
    }

    #bg-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
    }

    #vignette {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 18%, rgba(5, 5, 7, 0.72) 100%);
    }

    #grain {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    #stage {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4%;
      perspective: 900px;
    }

    .type-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 2.5rem;
      border-radius: 8px;
      background: rgba(5, 5, 7, 0.28);
      backdrop-filter: blur(8px) saturate(140%);
      -webkit-backdrop-filter: blur(8px) saturate(140%);
      border: 1px solid rgba(244, 244, 246, 0.06);
    }

    .headline-ready {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: clamp(3.5rem, 11vw, 7.5rem);
      letter-spacing: -0.03em;
      line-height: 0.92;
      text-transform: uppercase;
      color: var(--text);
      text-shadow: 0 4px 40px rgba(0, 0, 0, 0.55);
    }

    .headline-to {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.25rem, 3.2vw, 2.25rem);
      letter-spacing: 0.22em;
      text-transform: lowercase;
      color: var(--text-muted);
      margin: 0.35em 0 0.15em;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
    }

    .headline-rumble {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: clamp(4.5rem, 16vw, 11rem);
      letter-spacing: -0.04em;
      line-height: 0.88;
      text-transform: uppercase;
      color: var(--text);
      text-shadow: 0 0 60px rgba(244, 244, 246, 0.12), 0 6px 48px rgba(0, 0, 0, 0.6);
    }

    .line-mask {
      overflow: hidden;
      padding: 0.08em 0;
    }

    .line-mask > span {
      display: inline-block;
      transform: translateY(110%);
    }

    .char {
      display: inline-block;
      will-change: transform, opacity;
    }

    .divider {
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--text-muted), transparent);
      margin: 0.6em auto 0.4em;
    }

    .controls {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 0.75rem;
    }

    .controls button {
      background: rgba(244, 244, 246, 0.06);
      border: 1px solid rgba(244, 244, 246, 0.18);
      color: var(--text);
      padding: 0.4rem 1rem;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: background 0.2s var(--ease-out);
    }

    .controls button:hover {
      background: rgba(244, 244, 246, 0.12);
    }

    #timer {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      z-index: 100;
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      opacity: 0.55;
    }

    @media (prefers-reduced-motion: reduce) {
      .line-mask > span,
      .char,
      .headline-to,
      .divider {
        transform: none !important;
        opacity: 1 !important;
        filter: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div id="frame">
    <div id="frame-inner">
      <canvas id="bg-canvas"></canvas>
      <div id="vignette"></div>
      <div id="grain"></div>

      <div id="stage" aria-label="READY to RUMBLE">
        <div class="type-stack">
          <div class="headline-ready" id="ready"></div>
          <div class="headline-to" id="to">to</div>
          <div class="divider" id="div"></div>
          <div class="headline-rumble" id="rumble"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="timer">0.0s / 4.0s</div>
  <div class="controls">
    <button type="button" onclick="restart()">Replay</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    const P = {
      mode: 11,
      seed: 1737,
      loop: 4,
      speed: 0.17,
      scale: 0.6781197839181076,
      density: 0.5345837839837513,
      distort: 0.562815733595794,
      detail: 0.5571527385416483,
      grain: 0.17260376410733447,
      colors: ['#050507', '#2a2a31', '#8e8e98', '#f4f4f6'],
      mix: 0,
      pixel: 0,
      invert: 0
    };

    const canvas = document.getElementById('bg-canvas');
    const frameInner = document.getElementById('frame-inner');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

    if (!gl) {
      canvas.style.background = P.colors[0];
    } else {
      const VS = 'attribute vec2 a; void main(){ gl_Position = vec4(a, 0.0, 1.0); }';
      const FS = `
precision highp float;

uniform vec2  u_res;
uniform float u_phase;
uniform float u_seed;
uniform int   u_mode;
uniform float u_speed, u_scale, u_density, u_distort, u_detail, u_grain;
uniform vec3  u_c0, u_c1, u_c2, u_c3;
uniform sampler2D u_texture;
uniform float u_mix, u_pixel, u_invert;

#define TAU 6.28318530718

float hash21(vec2 p){
    p = fract(p * vec2(234.34, 435.345));
    p += dot(p, p + 34.23);
    return fract(p.x * p.y);
}

float vnoise(vec2 p){
    vec2 i = floor(p), f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    float a = hash21(i);
    float b = hash21(i + vec2(1.0, 0.0));
    float c = hash21(i + vec2(0.0, 1.0));
    float d = hash21(i + vec2(1.0, 1.0));
    return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

vec2 fade(vec2 t) { return t*t*t*(t*(t*6.0-15.0)+10.0); }
vec4 permute(vec4 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
float cnoise(vec2 P) {
    vec4 Pi = floor(P.xyxy) + vec4(0.0, 0.0, 1.0, 1.0);
    vec4 Pf = fract(P.xyxy) - vec4(0.0, 0.0, 1.0, 1.0);
    Pi = mod(Pi, 289.0);
    vec4 ix = Pi.xzxz; vec4 iy = Pi.yyww;
    vec4 fx = Pf.xzxz; vec4 fy = Pf.yyww;
    vec4 i = permute(permute(ix) + iy);
    vec4 gx = fract(i * (1.0 / 41.0)) * 2.0 - 1.0;
    vec4 gy = abs(gx) - 0.5;
    vec4 tx = floor(gx + 0.5);
    gx = gx - tx;
    vec2 g00 = vec2(gx.x,gy.x);
    vec2 g10 = vec2(gx.y,gy.y);
    vec2 g01 = vec2(gx.z,gy.z);
    vec2 g11 = vec2(gx.w,gy.w);
    vec4 norm = 1.79284291400159 - 0.85373472095314 * vec4(dot(g00, g00), dot(g01, g01), dot(g10, g10), dot(g11, g11));
    g00 *= norm.x; g01 *= norm.y; g10 *= norm.z; g11 *= norm.w;
    float n00 = dot(g00, vec2(fx.x, fy.x));
    float n10 = dot(g10, vec2(fx.y, fy.y));
    float n01 = dot(g01, vec2(fx.z, fy.z));
    float n11 = dot(g11, vec2(fx.w, fy.w));
    vec2 fade_xy = fade(Pf.xy);
    vec2 n_x = mix(vec2(n00, n01), vec2(n10, n11), fade_xy.x);
    return 2.3 * mix(n_x.x, n_x.y, fade_xy.y);
}

float fbm(vec2 p){
    float v = 0.0, a = 0.5;
    mat2 r = mat2(0.80, 0.60, -0.60, 0.80);
    for (int i = 0; i < 5; i++){
        v += a * vnoise(p);
        p  = r * p * 2.1 + vec2(1.7, 9.2);
        a *= 0.5;
    }
    return v;
}

vec2 loopOff(){
    return vec2(cos(u_phase), sin(u_phase)) * (0.10 + 0.55 * u_speed);
}

vec3 grad4(float t){
    t = clamp(t, 0.0, 1.0);
    vec3 c = mix(u_c0, u_c1, smoothstep(0.00, 0.35, t));
    c = mix(c, u_c2, smoothstep(0.35, 0.70, t));
    c = mix(c, u_c3, smoothstep(0.70, 1.00, t));
    return c;
}

void main(){
    vec2 uv = gl_FragCoord.xy / u_res;
    uv.y = 1.0 - uv.y;
    float ar = u_res.x / u_res.y;
    vec2 sOff = vec2(fract(u_seed * 0.193), fract(u_seed * 0.317)) * 47.0;
    vec3 col = vec3(0.0);

    if (u_mode == 11){
        vec2 p = (uv - 0.5) * vec2(ar, 1.0) * mix(1.5, 4.0, u_scale) + sOff;
        float t = u_phase * mix(0.2, 0.8, u_speed);
        vec2 q2 = p + vec2(cnoise(p * 0.8 + loopOff()),
                           cnoise(p * 0.8 + vec2(5.2, 1.3) - loopOff())) * u_distort;
        float v = sin(q2.x * mix(4.0, 12.0, u_density) + fbm(q2 * mix(1.5, 4.0, u_detail)) * 5.0) * 0.5 + 0.5;
        col = grad4(clamp(v, 0.0, 1.0));
        float vein = pow(abs(sin(q2.x * 8.0 + fbm(q2 * 3.0 + loopOff()) * 4.0)), 8.0);
        col += u_c3 * vein * 0.15;
    }

    col += (hash21(gl_FragCoord.xy + vec2(u_phase * 91.3)) - 0.5) * u_grain * 0.22;
    vec2 vig = uv * 2.0 - 1.0;
    col *= 1.0 - dot(vig, vig) * 0.16;

    if (u_invert > 0.5) {
        col = 1.0 - col;
    }

    gl_FragColor = vec4(col, 1.0);
}`;

      function compileShader(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
          console.error(gl.getShaderInfoLog(s));
          gl.deleteShader(s);
          return null;
        }
        return s;
      }

      const vs = compileShader(gl.VERTEX_SHADER, VS);
      const fs = compileShader(gl.FRAGMENT_SHADER, FS);
      const prog = gl.createProgram();
      gl.attachShader(prog, vs);
      gl.attachShader(prog, fs);
      gl.linkProgram(prog);
      gl.useProgram(prog);

      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
      const aLoc = gl.getAttribLocation(prog, 'a');
      gl.enableVertexAttribArray(aLoc);
      gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

      const U = {};
      ['u_res','u_phase','u_seed','u_mode','u_speed','u_scale','u_density','u_distort','u_detail','u_grain','u_c0','u_c1','u_c2','u_c3','u_texture','u_mix','u_pixel','u_invert']
        .forEach(n => { U[n] = gl.getUniformLocation(prog, n); });

      function hex2rgb(h) {
        return [
          parseInt(h.slice(1, 3), 16) / 255,
          parseInt(h.slice(3, 5), 16) / 255,
          parseInt(h.slice(5, 7), 16) / 255,
        ];
      }

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const rect = frameInner.getBoundingClientRect();
        canvas.width = Math.round(rect.width * dpr);
        canvas.height = Math.round(rect.height * dpr);
        gl.viewport(0, 0, canvas.width, canvas.height);
      }

      window.addEventListener('resize', resize);
      resize();

      const t0 = performance.now();
      function render(now) {
        const time = (now - t0) / 1000;
        const phase = (time / P.loop * Math.PI * 2) % (Math.PI * 2);

        gl.uniform2f(U.u_res, canvas.width, canvas.height);
        gl.uniform1f(U.u_phase, phase);
        gl.uniform1f(U.u_seed, (P.seed % 10000) * 0.6180339887 % 12.566);
        gl.uniform1i(U.u_mode, P.mode);
        gl.uniform1f(U.u_speed, P.speed);
        gl.uniform1f(U.u_scale, P.scale);
        gl.uniform1f(U.u_density, P.density);
        gl.uniform1f(U.u_distort, P.distort);
        gl.uniform1f(U.u_detail, P.detail);
        gl.uniform1f(U.u_grain, P.grain);
        gl.uniform1f(U.u_mix, P.mix);
        gl.uniform1f(U.u_pixel, P.pixel);
        gl.uniform1f(U.u_invert, P.invert);
        gl.uniform3fv(U.u_c0, hex2rgb(P.colors[0]));
        gl.uniform3fv(U.u_c1, hex2rgb(P.colors[1]));
        gl.uniform3fv(U.u_c2, hex2rgb(P.colors[2]));
        gl.uniform3fv(U.u_c3, hex2rgb(P.colors[3]));
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, null);
        gl.uniform1i(U.u_texture, 0);

        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(render);
      }
      requestAnimationFrame(render);
    }

    const freezeT = new URLSearchParams(location.search).get('t');
    let master;

    function splitChars(el) {
      const text = el.textContent;
      el.textContent = '';
      el.setAttribute('aria-hidden', 'true');
      for (const ch of text) {
        const span = document.createElement('span');
        span.className = 'char';
        span.textContent = ch === ' ' ? '\u00A0' : ch;
        el.appendChild(span);
      }
      return el.querySelectorAll('.char');
    }

    document.fonts.ready.then(() => {
      document.getElementById('ready').textContent = 'READY';
      document.getElementById('rumble').textContent = 'RUMBLE';
      const readyChars = splitChars(document.getElementById('ready'));
      const rumbleChars = splitChars(document.getElementById('rumble'));

      function build() {
        const tl = gsap.timeline({
          defaults: { ease: 'power4.out' },
          repeat: freezeT === null ? -1 : 0
        });

        tl.from(readyChars, {
          y: 72,
          opacity: 0,
          stagger: { each: 0.04, from: 'start' },
          duration: 0.55,
          ease: 'power3.out'
        }, 0)
        .from('#to', {
          opacity: 0,
          filter: 'blur(12px)',
          y: 12,
          duration: 0.5,
          ease: 'power2.out'
        }, 0.32)
        .to('#div', {
          width: 'min(40vw, 280px)',
          duration: 0.45,
          ease: 'power2.inOut'
        }, 0.48)
        .from(rumbleChars, {
          y: 80,
          opacity: 0,
          scale: 0.92,
          stagger: { each: 0.035, from: 'center' },
          duration: 0.6,
          ease: 'back.out(1.5)'
        }, 0.58)
        .to(rumbleChars, {
          scale: 1.03,
          duration: 0.22,
          yoyo: true,
          repeat: 1,
          ease: 'sine.inOut',
          stagger: { each: 0.018, from: 'center' }
        }, 1.5)
        .to({}, { duration: 1.75 }, 2.25);

        return tl;
      }

      master = build();

      const timerEl = document.getElementById('timer');
      gsap.ticker.add(() => {
        if (master) {
          const loopTime = master.time() % 4;
          timerEl.textContent = loopTime.toFixed(1) + 's / 4.0s';
        }
      });

      if (freezeT !== null) {
        master.pause(0, true);
        master.seek(parseFloat(freezeT), false, true);
      }

      window.__ready = true;
    });

    function restart() {
      if (master) master.restart();
    }
  </script>
</body>
</html>
