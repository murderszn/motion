<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE SLIME SESSIONS — JUNE 19</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800;900&family=Outfit:wght@200;400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #bg-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
      will-change: transform; display: block;
    }
    .overlay {
      position: fixed; inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      pointer-events: none;
    }
    .overlay > * { pointer-events: auto; }

    .label {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: clamp(11px, 1.2vw, 16px);
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 2px 16px rgba(0,0,0,0.8);
      margin-bottom: 12px;
      user-select: none;
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: clamp(64px, 16vw, 160px);
      letter-spacing: -0.04em;
      line-height: 0.85;
      color: #ffffff;
      text-shadow: 0 0 60px rgba(0,0,0,0.8), 0 4px 24px rgba(0,0,0,0.6);
      margin-bottom: 6px;
      user-select: none;
    }
    .subtitle {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: clamp(18px, 3.5vw, 40px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
      margin-bottom: 6px;
      user-select: none;
    }

    .date {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: clamp(13px, 1.8vw, 22px);
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 2px 16px rgba(0,0,0,0.8);
      margin-bottom: 8px;
      user-select: none;
    }

    .dj {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: clamp(15px, 2.2vw, 26px);
      letter-spacing: 0.12em;
      color: #ffffff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
      margin-bottom: 40px;
      user-select: none;
    }

    .btn-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: clamp(11px, 1.1vw, 15px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 14px 36px;
      border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.45);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .btn-primary {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.4);
      color: #ffffff;
    }
    .btn-primary:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: #ffffff;
      box-shadow: 0 8px 30px rgba(255, 255, 255, 0.15);
    }

    .footer-note {
      position: fixed;
      bottom: 20px;
      left: 0; right: 0;
      text-align: center;
      z-index: 1;
      font-family: 'Inter', sans-serif;
      font-weight: 200;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.15);
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .btn { padding: 12px 24px; width: 100%; }
      .btn-row { flex-direction: column; width: 100%; max-width: 260px; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="overlay">
    <div class="label">/motion x hypee present</div>
    <div class="logo"><span>SLIME</span></div>
    <div class="subtitle">sessions</div>
    <div class="date">june 19 · 9pm</div>
    <div class="dj"><span>dj eq</span> · hip hop &amp; rnb</div>
    <div class="btn-row">
      <a class="btn btn-primary" href="#">rsvp</a>
      <a class="btn" href="#">location</a>
      <a class="btn" href="#">preview</a>
    </div>
  </div>

  <div class="footer-note">slime season</div>

  <script>
    const canvas = document.getElementById('bg-canvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (!gl) {
      document.body.innerHTML = '<p style="padding:40px;color:#fff;font-family:sans-serif">WebGL not supported.</p>';
    }

    const FS = `
precision highp float;

uniform vec2  u_res;
uniform float u_phase;
uniform float u_seed;
uniform int   u_mode;
uniform float u_speed, u_scale, u_density, u_distort, u_detail, u_grain;
uniform vec3  u_c0, u_c1, u_c2, u_c3;
uniform float u_invert;

#define TAU 6.28318530718

float hash21(vec2 p){
    p = fract(p * vec2(234.34, 435.345));
    p += dot(p, p + 34.23);
    return fract(p.x * p.y);
}

float vnoise(vec2 p){
    vec2 i = floor(p), f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    float a = hash21(i);
    float b = hash21(i + vec2(1.0, 0.0));
    float c = hash21(i + vec2(0.0, 1.0));
    float d = hash21(i + vec2(1.0, 1.0));
    return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

float fbm(vec2 p){
    float v = 0.0, a = 0.5;
    mat2 r = mat2(0.80, 0.60, -0.60, 0.80);
    for (int i = 0; i < 5; i++){
        v += a * vnoise(p);
        p  = r * p * 2.1 + vec2(1.7, 9.2);
        a *= 0.5;
    }
    return v;
}

vec2 loopOff(){
    return vec2(cos(u_phase), sin(u_phase)) * (0.10 + 0.55 * u_speed);
}

vec3 grad4(float t){
    t = clamp(t, 0.0, 1.0);
    vec3 c = mix(u_c0, u_c1, smoothstep(0.00, 0.35, t));
    c = mix(c, u_c2, smoothstep(0.35, 0.70, t));
    c = mix(c, u_c3, smoothstep(0.70, 1.00, t));
    return c;
}

void main(){
    vec2 uv = gl_FragCoord.xy / u_res;
    uv.y = 1.0 - uv.y;
    float ar = u_res.x / u_res.y;
    vec2 sOff = vec2(fract(u_seed * 0.193), fract(u_seed * 0.317)) * 47.0;

    vec3 col = vec3(0.0);

    if (u_mode == 2){
        vec2 p = (uv - 0.5) * vec2(ar, 1.0) * mix(1.2, 5.0, u_scale) + sOff;
        float w = 1.0 + 3.0 * u_distort;
        vec2 q = vec2(fbm(p + loopOff()),
                      fbm(p + vec2(5.2, 1.3) - loopOff()));
        vec2 r = vec2(fbm(p + q * w + vec2(1.7, 9.2) + loopOff() * 0.7),
                      fbm(p + q * w + vec2(8.3, 2.8) - loopOff() * 0.4));
        float f = fbm(p + r * (1.0 + 2.5 * u_detail));
        col = grad4(clamp(f * 1.45 + 0.10 * r.x - 0.05, 0.0, 1.0));
        col = mix(col, u_c2, q.y * q.x * 0.25);
    }

    col += (hash21(gl_FragCoord.xy + vec2(u_phase * 91.3)) - 0.5) * u_grain * 0.22;
    vec2 v = uv * 2.0 - 1.0;
    col *= 1.0 - dot(v, v) * 0.16;
    if (u_invert > 0.5) { col = 1.0 - col; }
    gl_FragColor = vec4(col, 1.0);
}`;

    const VS = 'attribute vec2 a; void main(){ gl_Position = vec4(a, 0.0, 1.0); }';

    function compileShader(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(s));
        gl.deleteShader(s);
        return null;
      }
      return s;
    }

    const vs = compileShader(gl.VERTEX_SHADER, VS);
    const fs = compileShader(gl.FRAGMENT_SHADER, FS);
    const prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const aLoc = gl.getAttribLocation(prog, 'a');
    gl.enableVertexAttribArray(aLoc);
    gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

    const U = {};
    const uniforms = ['u_res','u_phase','u_seed','u_mode','u_speed','u_scale','u_density','u_distort','u_detail','u_grain','u_c0','u_c1','u_c2','u_c3','u_invert'];
    uniforms.forEach(n => { U[n] = gl.getUniformLocation(prog, n); });

    const P = {
      mode: 2,
      seed: 9015,
      loop: 4.0,
      speed: 0.50,
      scale: 1.00,
      density: 0.76,
      distort: 0.83,
      detail: 0.82,
      grain: 0.20,
      invert: 1,
      colors: ['#ffffff', '#ffffff', '#4300e0', '#fff5f5']
    };

    function hex2rgb(h) {
      return [
        parseInt(h.slice(1, 3), 16) / 255,
        parseInt(h.slice(3, 5), 16) / 255,
        parseInt(h.slice(5, 7), 16) / 255,
      ];
    }

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.round(window.innerWidth * dpr);
      canvas.height = Math.round(window.innerHeight * dpr);
      gl.viewport(0, 0, canvas.width, canvas.height);
    }
    window.addEventListener('resize', resize);
    resize();

    const t0 = performance.now();
    function render(now) {
      const time = (now - t0) / 1000;
      const phase = (time / P.loop * Math.PI * 2) % (Math.PI * 2);

      gl.uniform2f(U.u_res, canvas.width, canvas.height);
      gl.uniform1f(U.u_phase, phase);
      gl.uniform1f(U.u_seed, (P.seed % 10000) * 0.6180339887 % 12.566);
      gl.uniform1i(U.u_mode, P.mode);
      gl.uniform1f(U.u_speed, P.speed);
      gl.uniform1f(U.u_scale, P.scale);
      gl.uniform1f(U.u_density, P.density);
      gl.uniform1f(U.u_distort, P.distort);
      gl.uniform1f(U.u_detail, P.detail);
      gl.uniform1f(U.u_grain, P.grain);
      gl.uniform1f(U.u_invert, P.invert);
      gl.uniform3fv(U.u_c0, hex2rgb(P.colors[0]));
      gl.uniform3fv(U.u_c1, hex2rgb(P.colors[1]));
      gl.uniform3fv(U.u_c2, hex2rgb(P.colors[2]));
      gl.uniform3fv(U.u_c3, hex2rgb(P.colors[3]));

      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
  </script>
</body>
</html>
