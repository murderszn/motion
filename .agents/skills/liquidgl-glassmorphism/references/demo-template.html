<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>liquidGL Glassmorphism Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 200vh;
      color: #fff;
    }
    .hero {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; padding: 2rem;
    }
    .hero h1 { font-size: 3rem; font-weight: 800; text-align: center; }
    .hero p { font-size: 1.1rem; opacity: 0.8; text-align: center; margin-top: 0.5rem; }

    .glass-card {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(420px, 85vw);
      padding: 2.5rem;
      border-radius: 24px;
      z-index: 9999;
      text-align: center;
    }
    .glass-card h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .glass-card p { font-size: 0.9rem; line-height: 1.6; opacity: 0.85; }
    .glass-card .btn {
      display: inline-block; margin-top: 1.2rem;
      padding: 0.7rem 1.8rem; border-radius: 12px;
      background: rgba(255,255,255,0.15); color: #fff;
      text-decoration: none; font-weight: 600; font-size: 0.85rem;
      border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.2s;
    }
    .glass-card .btn:hover { background: rgba(255,255,255,0.25); }

    .section { height: 100vh; display: flex; align-items: center; justify-content: center; }
    .section h2 { font-size: 2rem; font-weight: 700; }

    video.bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: -1;
    }
  </style>
</head>
<body>

  <!-- Background content to refract -->
  <div class="hero">
    <div>
      <h1>liquidGL Demo</h1>
      <p>The card in the center refracts this content in real-time.</p>
    </div>
  </div>
  <div class="section"><h2>Scroll down</h2></div>
  <div class="section"><h2>More content here</h2></div>

  <!-- Glass pane -->
  <div class="glass-card liquidGL">
    <h2>Glassmorphism</h2>
    <p>This card uses liquidGL to refract the page content behind it in real-time WebGL.</p>
    <a href="https://github.com/naughtyduk/liquidGL" target="_blank" class="btn">View on GitHub</a>
  </div>

  <!-- Dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <script src="../assets/liquidGL.js" defer></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      liquidGL({
        target: ".glass-card",
        snapshot: "body",
        resolution: 2,
        refraction: 0.015,
        bevelDepth: 0.06,
        bevelWidth: 0.18,
        frost: 1.5,
        shadow: true,
        specular: true,
        reveal: "fade",
        tilt: true,
        tiltFactor: 5,
        magnify: 1,
        on: {
          init(instance) {
            console.log("liquidGL ready", instance);
          }
        }
      });
    });
  </script>
</body>
</html>
